{% extends "base.html" %}

{% block content_action %}
  {# Original edit/view buttons #}
  {{ super() }}

  {# Custom Download button pointing to local same-domain source #}
  {% if page and page.file %}
    <a href="{{ base_url }}sources/{{ page.file.src_path }}" 
       download="{{ page.title | replace(' ', '-') }}.md"
       title="Download Markdown" 
       class="md-content__button md-icon">
      {% include ".icons/material/download.svg" %}
    </a>
  {% endif %}
{% endblock %}
