{% extends "base.html" %}

{% block content_action %}
  {# Original view button #}
  {{ super() }}

  {# Custom Download button with absolute-root path and robust JS #}
  {% if page and page.file %}
    <a href="javascript:void(0)" 
       onclick="downloadFile('{{ config.site_url }}sources/{{ page.file.src_path }}', '{{ page.title | replace("'", "\\'") }}.md')"
       title="Download Markdown" 
       class="md-content__button md-icon">
      {% include ".icons/material/download.svg" %}
    </a>

    <script>
      async function downloadFile(url, fileName) {
        try {
          const response = await fetch(url);
          if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
          
          const blob = await response.blob();
          const blobUrl = window.URL.createObjectURL(blob);
          
          const link = document.createElement('a');
          link.href = blobUrl;
          link.download = fileName.replace(/[/\\?%*:|"<>]/g, '-');
          
          document.body.appendChild(link);
          link.click();
          
          // Cleanup
          setTimeout(() => {
            window.URL.revokeObjectURL(blobUrl);
            document.body.removeChild(link);
          }, 100);
        } catch (error) {
          console.error('Download failed:', error);
          // Fallback to direct navigation if fetch fails
          window.location.href = url;
        }
      }
    </script>
  {% endif %}
{% endblock %}
